<?php if (\$pages > 1): ?>
<nav aria-label="Page navigation">
	<ul class="pagination justify-content-center">
		<li class="page-item <?= \$page <= 1 ? 'disabled' : '' ?>"><a class="page-link" href="?page=<?= max(1, \$page - 1) ?>"><i class="bi bi-chevron-left"></i></a></li>
		<?php for (\$i = 1; \$i <= \$pages; \$i++): ?>
			<li class="page-item <?= \$i === \$page ? 'active' : '' ?>"><a class="page-link" href="?page=<?= \$i ?>"><?= \$i ?></a></li>
		<?php endfor; ?>
		<li class="page-item <?= \$page >= \$pages ? 'disabled' : '' ?>"><a class="page-link" href="?page=<?= min(\$pages, \$page + 1) ?>"><i class="bi bi-chevron-right"></i></a></li>
	</ul>
</nav>
<?php endif; ?>
