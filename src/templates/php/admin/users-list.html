<?php
declare(strict_types=1);

require_once __DIR__ . '/../bootstrap.php';
require_admin();

use RedBeanPHP\\R;

\$page_title = 'Users';
\$active     = 'users';

\$q       = trim((string) (\$_GET['q'] ?? ''));
\$page    = max(1, (int) (\$_GET['page'] ?? 1));
\$perPage = 20;
\$offset  = (\$page - 1) * \$perPage;

if (\$q !== '') {
	\$total = (int) R::count('user', 'email LIKE ? OR name LIKE ?', ["%\$q%", "%\$q%"]);
	\$rows  = R::find('user', 'email LIKE ? OR name LIKE ? ORDER BY id DESC LIMIT ? OFFSET ?', ["%\$q%", "%\$q%", \$perPage, \$offset]);
} else {
	\$total = (int) R::count('user');
	\$rows  = R::find('user', 'ORDER BY id DESC LIMIT ? OFFSET ?', [\$perPage, \$offset]);
}

\$pages = max(1, (int) ceil(\$total / \$perPage));

ob_start();
?>
<div class="card border-0 shadow-sm">
	<div class="card-header bg-body d-flex flex-column flex-md-row gap-2 justify-content-between align-items-md-center">
		<form class="d-flex" role="search" method="get">
			<div class="input-group input-group-sm" style="min-width: 280px;">
				<span class="input-group-text"><i class="bi bi-search"></i></span>
				<input type="search" name="q" value="<?= e(\$q) ?>" class="form-control" placeholder="Search users..." />
				<button class="btn btn-outline-secondary" type="submit">Search</button>
			</div>
		</form>
		<a href="/admin/user-edit.php" class="btn btn-sm btn-primary"><i class="bi bi-plus-lg me-1"></i>New user</a>
	</div>
	<div class="table-responsive">
		<table class="table table-hover align-middle mb-0">
			<thead class="bg-body-tertiary">
				<tr>
					<th>#</th>
					<th>Name</th>
					<th>Email</th>
					<th>Role</th>
					<th>Created</th>
					<th></th>
				</tr>
			</thead>
			<tbody>
			<?php if (!\$rows): ?>
				<tr><td colspan="6" class="text-center py-4 text-body-secondary">No users found.</td></tr>
			<?php endif; ?>
			<?php foreach (\$rows as \$u): ?>
				<tr>
					<td><?= (int) \$u->id ?></td>
					<td class="fw-semibold"><?= e(\$u->name) ?></td>
					<td><?= e(\$u->email) ?></td>
					<td>
						<?php if (\$u->role === 'admin'): ?>
							<span class="badge text-bg-danger">admin</span>
						<?php else: ?>
							<span class="badge text-bg-secondary"><?= e(\$u->role ?: 'user') ?></span>
						<?php endif; ?>
					</td>
					<td class="small text-body-secondary"><?= e(\$u->created_at) ?></td>
					<td class="text-end">
						<a href="/admin/user-edit.php?id=<?= (int) \$u->id ?>" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
						<form action="/admin/user-delete.php" method="post" class="d-inline" onsubmit="return confirm('Delete this user?');">
							<?= csrf_field() ?>
							<input type="hidden" name="id" value="<?= (int) \$u->id ?>" />
							<button class="btn btn-sm btn-outline-danger" type="submit"><i class="bi bi-trash"></i></button>
						</form>
					</td>
				</tr>
			<?php endforeach; ?>
			</tbody>
		</table>
	</div>
	<div class="card-footer d-flex justify-content-between align-items-center bg-body">
		<small class="text-body-secondary">Showing <?= count(\$rows) ?> of <?= (int) \$total ?></small>
		<?php if (\$pages > 1): ?>
		<nav><ul class="pagination pagination-sm mb-0">
			<li class="page-item <?= \$page <= 1 ? 'disabled' : '' ?>"><a class="page-link" href="?q=<?= e(\$q) ?>&page=<?= max(1, \$page - 1) ?>">&laquo;</a></li>
			<?php for (\$i = 1; \$i <= \$pages; \$i++): ?>
				<li class="page-item <?= \$i === \$page ? 'active' : '' ?>"><a class="page-link" href="?q=<?= e(\$q) ?>&page=<?= \$i ?>"><?= \$i ?></a></li>
			<?php endfor; ?>
			<li class="page-item <?= \$page >= \$pages ? 'disabled' : '' ?>"><a class="page-link" href="?q=<?= e(\$q) ?>&page=<?= min(\$pages, \$page + 1) ?>">&raquo;</a></li>
		</ul></nav>
		<?php endif; ?>
	</div>
</div>
<?php
\$content = ob_get_clean();
include __DIR__ . '/layout.php';
