<!doctype html>
<html lang="en" data-bs-theme="light">
	<head>
		<title>${1:Title}</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="${2:Page description}" />

		<!-- Open Graph -->
		<meta property="og:title" content="${1:Title}" />
		<meta property="og:description" content="${2:Page description}" />
		<meta property="og:image" content="${3:https://via.placeholder.com/1200x630}" />
		<meta property="og:type" content="website" />

		<link rel="icon" href="${4:/favicon.ico}" />

		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
	</head>
	<body class="d-flex flex-column min-vh-100">
		<header>
			<nav class="navbar navbar-expand-lg sticky-top bg-body border-bottom">
				<div class="container">
					<a class="navbar-brand fw-bold" href="${5:#}">${6:Brand}</a>
					<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
						<span class="navbar-toggler-icon"></span>
					</button>
					<div class="collapse navbar-collapse" id="mainNav">
						<ul class="navbar-nav me-auto">
							<li class="nav-item"><a class="nav-link active" href="${7:#}">${8:Home}</a></li>
							<li class="nav-item"><a class="nav-link" href="${9:#}">${10:Features}</a></li>
							<li class="nav-item"><a class="nav-link" href="${11:#}">${12:Pricing}</a></li>
							<li class="nav-item"><a class="nav-link" href="${13:#}">${14:Contact}</a></li>
						</ul>
						<div class="d-flex gap-2">
							<a href="${15:/login}" class="btn btn-outline-secondary">${16:Sign in}</a>
							<a href="${17:/register}" class="btn btn-primary">${18:Get started}</a>
						</div>
					</div>
				</div>
			</nav>
		</header>

		<main class="flex-grow-1">
			$19
		</main>

		<footer class="py-4 border-top">
			<div class="container">
				<div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
					<span class="text-body-secondary small">&copy; ${20:2025} ${6:Brand}. ${21:All rights reserved.}</span>
					<div class="d-flex gap-3">
						<a href="${22:#}" class="text-body-secondary"><i class="bi bi-twitter-x"></i></a>
						<a href="${23:#}" class="text-body-secondary"><i class="bi bi-github"></i></a>
						<a href="${24:#}" class="text-body-secondary"><i class="bi bi-linkedin"></i></a>
					</div>
				</div>
			</div>
		</footer>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
