<section class="text-white py-5 py-md-6" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
	<div class="container py-5">
		<div class="row align-items-center g-5">
			<div class="col-lg-7">
				<span class="badge bg-white bg-opacity-25 rounded-pill px-3 py-2 mb-3">${1:What's new}</span>
				<h1 class="display-4 fw-bold mb-3">${2:Ship beautiful product pages in minutes}</h1>
				<p class="lead opacity-75 mb-4">${3:Production-ready Bootstrap 5 snippets, fully responsive and themeable.}</p>
				<form class="row g-2 mb-3" style="max-width: 480px;">
					<div class="col-sm">
						<label for="heroNewsletterEmail" class="visually-hidden">${4:Email}</label>
						<input id="heroNewsletterEmail" type="email" class="form-control form-control-lg" placeholder="${5:you@example.com}" required />
					</div>
					<div class="col-sm-auto">
						<button type="submit" class="btn btn-light btn-lg w-100 px-4">${6:Notify me}</button>
					</div>
				</form>
				<small class="opacity-75">${7:No spam. Unsubscribe anytime.}</small>
			</div>
			<div class="col-lg-5 d-none d-lg-block">
				<img src="${8:https://via.placeholder.com/520x420}" alt="${9:Preview}" class="img-fluid rounded-3 shadow-lg" />
			</div>
		</div>
	</div>
</section>
