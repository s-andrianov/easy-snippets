<header class="py-5 py-md-6 bg-body-tertiary border-bottom">
	<div class="container">
		<nav aria-label="${1:breadcrumb}">
			<ol class="breadcrumb mb-3 small">
				<li class="breadcrumb-item"><a href="${2:#}" class="text-decoration-none">${3:Home}</a></li>
				<li class="breadcrumb-item"><a href="${4:#}" class="text-decoration-none">${5:Section}</a></li>
				<li class="breadcrumb-item active" aria-current="page">${6:Current page}</li>
			</ol>
		</nav>
		<div class="row align-items-end g-3">
			<div class="col-md">
				<h1 class="display-5 fw-bold mb-1">${7:Page title}</h1>
				<p class="lead text-body-secondary mb-0">${8:Short page description that explains what's on this page.}</p>
			</div>
			<div class="col-md-auto">
				<a href="${9:#}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>${10:Primary action}</a>
				<a href="${11:#}" class="btn btn-outline-secondary">${12:Secondary}</a>
			</div>
		</div>
	</div>
</header>
