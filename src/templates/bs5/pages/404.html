<!doctype html>
<html lang="en" data-bs-theme="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>${1:404 - Page not found}</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

	<body class="bg-body-tertiary">
		<section class="vh-100 d-flex align-items-center">
			<div class="container">
				<div class="row justify-content-center text-center">
					<div class="col-12 col-md-8 col-lg-6">
						<div class="display-1 fw-bold text-primary mb-2" style="font-size: 8rem; line-height: 1;">${2:404}</div>

						<div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
							<a href="${5:/}" class="btn btn-primary px-4"><i class="bi bi-house me-2"></i>${6:Back to home}</a>
							<a href="${7:#}" class="btn btn-outline-secondary px-4" onclick="history.back(); return false;"><i class="bi bi-arrow-left me-2"></i>${8:Go back}</a>

					</div>
				</div>
			</div>
		</section>
	</body>
