<!doctype html>
<html lang="en" data-bs-theme="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>${1:Sign in} &mdash; ${2:Brand}</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
	</head>
	<body class="bg-body-tertiary">
		<section class="vh-100 d-flex align-items-center">
			<div class="container">
				<div class="row justify-content-center">
					<div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
						<div class="card border-0 shadow-sm">
							<div class="card-body p-4 p-md-5">
								<div class="text-center mb-4">
									<a href="${3:#}" class="text-decoration-none">
										<h1 class="h3 fw-bold mb-1">${2:Brand}</h1>
									</a>
									<p class="text-body-secondary mb-0">${4:Sign in to your account}</p>
								</div>
								<form action="${5:/login}" method="post">
									<div class="form-floating mb-3">
										<input type="email" class="form-control" id="loginEmail" name="email" placeholder="name@example.com" required />
										<label for="loginEmail">${6:Email address}</label>
									</div>
									<div class="form-floating mb-3">
										<input type="password" class="form-control" id="loginPassword" name="password" placeholder="Password" required />
										<label for="loginPassword">${7:Password}</label>
									</div>
									<div class="d-flex justify-content-between align-items-center mb-3">
										<div class="form-check">
											<input class="form-check-input" type="checkbox" id="rememberMe" name="remember" />
											<label class="form-check-label" for="rememberMe">${8:Remember me}</label>
										</div>
										<a href="${9:/forgot-password}" class="small text-decoration-none">${10:Forgot password?}</a>
									</div>
									<button type="submit" class="btn btn-primary w-100 py-2 mb-3">${11:Sign in}</button>
									<p class="text-center small text-body-secondary mb-0">
										${12:Don't have an account?} <a href="${13:/register}" class="text-decoration-none">${14:Sign up}</a>
									</p>
								</form>
							</div>
						</div>
					</div>
				</div>
			</div>
		</section>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
