<!doctype html>
<html lang="en" data-bs-theme="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>${1:Contact us} &mdash; ${2:Brand}</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
	</head>
	<body>
		<nav class="navbar navbar-expand-lg sticky-top bg-body border-bottom">
			<div class="container">
				<a class="navbar-brand fw-bold" href="#">${2:Brand}</a>
				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
				<div class="collapse navbar-collapse" id="mainNav">
					<ul class="navbar-nav ms-auto">
						<li class="nav-item"><a class="nav-link" href="${3:#}">${4:Home}</a></li>
						<li class="nav-item"><a class="nav-link" href="${5:#}">${6:About}</a></li>
						<li class="nav-item"><a class="nav-link active" href="#">${7:Contact}</a></li>
					</ul>
				</div>
			</div>
		</nav>
		<header class="py-5 bg-body-tertiary border-bottom text-center">
			<div class="container">
				<h1 class="display-5 fw-bold">${8:Let's talk}</h1>
				<p class="lead text-body-secondary mb-0">${9:We'd love to hear from you.}</p>
			</div>
		</header>
		<section class="py-5">
			<div class="container">
				<div class="row g-5">
					<div class="col-lg-5">
						<h2 class="h4 fw-bold mb-3">${10:Get in touch}</h2>
						<ul class="list-unstyled mb-4">
							<li class="mb-3 d-flex"><i class="bi bi-geo-alt-fill text-primary fs-5 me-3"></i><div><div class="fw-semibold">${11:Office}</div><div class="text-body-secondary small">${12:Sample Street 1, City}</div></div></li>
							<li class="mb-3 d-flex"><i class="bi bi-envelope-fill text-primary fs-5 me-3"></i><div><div class="fw-semibold">${13:Email}</div><a href="mailto:${14:hello@example.com}" class="text-decoration-none text-body-secondary small">${14:hello@example.com}</a></div></li>
							<li class="d-flex"><i class="bi bi-telephone-fill text-primary fs-5 me-3"></i><div><div class="fw-semibold">${15:Phone}</div><a href="tel:${16:+1234567890}" class="text-decoration-none text-body-secondary small">${16:+1 (234) 567-890}</a></div></li>
						</ul>
					</div>
					<div class="col-lg-7">
						<div class="card border-0 shadow-sm"><div class="card-body p-4 p-md-5">
							<form action="${17:/contact}" method="post" class="row g-3">
								<div class="col-sm-6"><label class="form-label">${18:First name}</label><input type="text" class="form-control" name="first_name" required /></div>
								<div class="col-sm-6"><label class="form-label">${19:Last name}</label><input type="text" class="form-control" name="last_name" required /></div>
								<div class="col-12"><label class="form-label">${20:Email}</label><input type="email" class="form-control" name="email" required /></div>
								<div class="col-12"><label class="form-label">${21:Subject}</label><input type="text" class="form-control" name="subject" /></div>
								<div class="col-12"><label class="form-label">${22:Message}</label><textarea name="message" rows="5" class="form-control" required></textarea></div>
								<div class="col-12"><button type="submit" class="btn btn-primary btn-lg px-4">${23:Send message}</button></div>
							</form>
						</div></div>
					</div>
				</div>
			</div>
		</section>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
