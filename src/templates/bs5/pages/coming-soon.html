<!doctype html>
<html lang="en" data-bs-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>${1:Coming soon} &mdash; ${2:Brand}</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
	</head>
	<body style="background: linear-gradient(135deg, #1a1c20, #2a2d35);">
		<section class="min-vh-100 d-flex flex-column">
			<header class="p-4">
				<a href="#" class="text-decoration-none text-white">
					<h1 class="h4 fw-bold mb-0">${2:Brand}</h1>
				</a>
			</header>
			<div class="flex-grow-1 d-flex align-items-center">
				<div class="container">
					<div class="row justify-content-center text-center text-white">
						<div class="col-12 col-md-10 col-lg-8">
							<span class="badge bg-white bg-opacity-25 rounded-pill px-3 py-2 mb-3">${3:Launching soon}</span>
							<h2 class="display-3 fw-bold mb-3">${4:Something amazing is coming}</h2>
							<p class="lead opacity-75 mb-5">${5:Be the first to know when we go live. Drop your email and we'll send you an invite.}</p>
							<form class="row g-2 justify-content-center mb-4">
								<div class="col-12 col-sm-7 col-lg-6">
									<input type="email" class="form-control form-control-lg" placeholder="${6:you@example.com}" required />
								</div>
								<div class="col-12 col-sm-auto">
									<button type="submit" class="btn btn-light btn-lg w-100 px-4">${7:Notify me}</button>
								</div>
							</form>
							<div class="d-flex gap-3 justify-content-center fs-4">
								<a href="${8:#}" class="text-white"><i class="bi bi-twitter-x"></i></a>
								<a href="${9:#}" class="text-white"><i class="bi bi-instagram"></i></a>
								<a href="${10:#}" class="text-white"><i class="bi bi-github"></i></a>
							</div>
						</div>
					</div>
				</div>
			</div>
			<footer class="p-4 text-center text-white-50 small">&copy; ${11:2025} ${2:Brand}</footer>
		</section>
	</body>
</html>
