<!doctype html>
<html lang="en" data-bs-theme="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>${1:Create account} &mdash; ${2:Brand}</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
	</head>
	<body class="bg-body-tertiary">
		<section class="min-vh-100 d-flex align-items-center py-5">
			<div class="container">
				<div class="row justify-content-center">
					<div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
						<div class="card border-0 shadow-sm">
							<div class="card-body p-4 p-md-5">
								<div class="text-center mb-4">
									<h1 class="h3 fw-bold mb-1">${3:Create account}</h1>
									<p class="text-body-secondary mb-0">${4:It only takes a minute}</p>
								</div>
								<form action="${5:/register}" method="post" class="needs-validation" novalidate>
									<div class="row g-3 mb-3">
										<div class="col-sm-6">
											<div class="form-floating">
												<input type="text" class="form-control" id="firstName" name="first_name" placeholder="First" required />
												<label for="firstName">${6:First name}</label>
											</div>
										</div>
										<div class="col-sm-6">
											<div class="form-floating">
												<input type="text" class="form-control" id="lastName" name="last_name" placeholder="Last" required />
												<label for="lastName">${7:Last name}</label>
											</div>
										</div>
									</div>
									<div class="form-floating mb-3">
										<input type="email" class="form-control" id="regEmail" name="email" placeholder="name@example.com" required />
										<label for="regEmail">${8:Email}</label>
									</div>
									<div class="form-floating mb-3">
										<input type="password" class="form-control" id="regPassword" name="password" minlength="8" placeholder="Password" required />
										<label for="regPassword">${9:Password}</label>
									</div>
									<div class="form-floating mb-3">
										<input type="password" class="form-control" id="regConfirm" name="password_confirmation" placeholder="Confirm" required />
										<label for="regConfirm">${10:Confirm password}</label>
									</div>
									<div class="form-check mb-3">
										<input class="form-check-input" type="checkbox" id="acceptTerms" name="accept_terms" required />
										<label class="form-check-label small" for="acceptTerms">
											${11:I agree to the} <a href="${12:#}" class="text-decoration-none">${13:Terms}</a> ${14:and} <a href="${15:#}" class="text-decoration-none">${16:Privacy Policy}</a>
										</label>
									</div>
									<button type="submit" class="btn btn-primary w-100 py-2 mb-3">${17:Create account}</button>
									<p class="text-center small text-body-secondary mb-0">
										${18:Already have an account?} <a href="${19:/login}" class="text-decoration-none">${20:Sign in}</a>
									</p>
								</form>
							</div>
						</div>
					</div>
				</div>
			</div>
		</section>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
