<section class="vh-100 d-flex align-items-center bg-body-tertiary">
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
				<div class="card border-0 shadow-sm">
					<div class="card-body p-4 p-md-5 text-center">
						<div class="mb-3"><i class="bi bi-envelope-check" style="font-size: 2.5rem;"></i></div>
						<h1 class="h3 fw-bold mb-1">${1:Check your email}</h1>
						<p class="text-body-secondary mb-4">${2:We sent a 6-digit verification code to <strong>you@example.com</strong>}</p>
						<form>
							<div class="d-flex justify-content-center gap-2 mb-4">
								<input type="text" inputmode="numeric" maxlength="1" class="form-control form-control-lg text-center fw-bold" style="width: 3rem;" required />
								<input type="text" inputmode="numeric" maxlength="1" class="form-control form-control-lg text-center fw-bold" style="width: 3rem;" required />
								<input type="text" inputmode="numeric" maxlength="1" class="form-control form-control-lg text-center fw-bold" style="width: 3rem;" required />
								<input type="text" inputmode="numeric" maxlength="1" class="form-control form-control-lg text-center fw-bold" style="width: 3rem;" required />
								<input type="text" inputmode="numeric" maxlength="1" class="form-control form-control-lg text-center fw-bold" style="width: 3rem;" required />
								<input type="text" inputmode="numeric" maxlength="1" class="form-control form-control-lg text-center fw-bold" style="width: 3rem;" required />
							</div>
							<button type="submit" class="btn btn-primary w-100 py-2 mb-3">${3:Verify}</button>
							<p class="small text-body-secondary mb-0">
								${4:Didn't get the code?} <a href="${5:#}" class="text-decoration-none">${6:Resend}</a>
							</p>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
