<section class="min-vh-100">
	<div class="container-fluid">
		<div class="row g-0 min-vh-100">
			<div class="col-lg-6 d-none d-lg-flex align-items-center justify-content-center bg-primary text-white p-5" style="background: linear-gradient(135deg, var(--bs-primary), var(--bs-info));">
				<div class="text-center" style="max-width: 480px;">
					<h2 class="display-5 fw-bold mb-3">${1:Welcome back!}</h2>
					<p class="lead opacity-75 mb-0">${2:Sign in to access your dashboard, track your progress and continue where you left off.}</p>
				</div>
			</div>
			<div class="col-lg-6 d-flex align-items-center justify-content-center p-4 p-md-5">
				<div class="w-100" style="max-width: 420px;">
					<a href="${3:#}" class="text-decoration-none">
						<h1 class="h3 fw-bold mb-4">${4:Brand}</h1>
					</a>
					<h2 class="h4 mb-1">${5:Sign in}</h2>
					<p class="text-body-secondary mb-4">${6:Enter your credentials to continue}</p>
					<form>
						<div class="form-floating mb-3">
							<input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required />
							<label for="loginEmail">${7:Email address}</label>
						</div>
						<div class="form-floating mb-3">
							<input type="password" class="form-control" id="loginPassword" placeholder="Password" required />
							<label for="loginPassword">${8:Password}</label>
						</div>
						<div class="d-flex justify-content-between align-items-center mb-3">
							<div class="form-check">
								<input class="form-check-input" type="checkbox" id="rememberMe" />
								<label class="form-check-label" for="rememberMe">${9:Remember me}</label>
							</div>
							<a href="${10:#}" class="small text-decoration-none">${11:Forgot password?}</a>
						</div>
						<button type="submit" class="btn btn-primary w-100 py-2 mb-3">${12:Sign in}</button>
						<div class="text-center text-body-secondary small my-3">${13:or continue with}</div>
						<div class="d-grid gap-2 d-sm-flex mb-3">
							<button type="button" class="btn btn-outline-secondary flex-fill"><i class="bi bi-google me-2"></i>Google</button>
							<button type="button" class="btn btn-outline-secondary flex-fill"><i class="bi bi-github me-2"></i>GitHub</button>
						</div>
						<p class="text-center small text-body-secondary mb-0">
							${14:Don't have an account?} <a href="${15:#}" class="text-decoration-none">${16:Sign up}</a>
						</p>
					</form>
				</div>
			</div>
		</div>
	</div>
</section>
