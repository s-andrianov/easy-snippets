<section class="vh-100 d-flex align-items-center bg-body-tertiary">
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
				<div class="card border-0 shadow-sm">
					<div class="card-body p-4 p-md-5">
						<div class="text-center mb-4">
							<a href="${1:#}" class="text-decoration-none">
								<h1 class="h3 fw-bold mb-1">${2:Brand}</h1>
							</a>
							<p class="text-body-secondary mb-0">${3:Sign in to your account}</p>
						</div>
						<form>
							<div class="form-floating mb-3">
								<input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required />
								<label for="loginEmail">${4:Email address}</label>
							</div>
							<div class="form-floating mb-3">
								<input type="password" class="form-control" id="loginPassword" placeholder="Password" required />
								<label for="loginPassword">${5:Password}</label>
							</div>
							<div class="d-flex justify-content-between align-items-center mb-3">
								<div class="form-check">
									<input class="form-check-input" type="checkbox" id="rememberMe" />
									<label class="form-check-label" for="rememberMe">${6:Remember me}</label>
								</div>
								<a href="${7:#}" class="small text-decoration-none">${8:Forgot password?}</a>
							</div>
							<button type="submit" class="btn btn-primary w-100 py-2 mb-3">${9:Sign in}</button>
							<p class="text-center small text-body-secondary mb-0">
								${10:Don't have an account?} <a href="${11:#}" class="text-decoration-none">${12:Sign up}</a>
							</p>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
