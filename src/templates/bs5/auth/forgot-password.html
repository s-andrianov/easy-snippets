<section class="vh-100 d-flex align-items-center bg-body-tertiary">
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
				<div class="card border-0 shadow-sm">
					<div class="card-body p-4 p-md-5">
						<div class="text-center mb-4">
							<div class="mb-3"><i class="bi bi-shield-lock" style="font-size: 2.5rem;"></i></div>
							<h1 class="h3 fw-bold mb-1">${1:Forgot password?}</h1>
							<p class="text-body-secondary mb-0">${2:We'll send a reset link to your email}</p>
						</div>
						<form>
							<div class="form-floating mb-3">
								<input type="email" class="form-control" id="forgotEmail" placeholder="name@example.com" required />
								<label for="forgotEmail">${3:Email address}</label>
							</div>
							<button type="submit" class="btn btn-primary w-100 py-2 mb-3">${4:Send reset link}</button>
							<p class="text-center small mb-0">
								<a href="${5:#}" class="text-decoration-none"><i class="bi bi-arrow-left me-1"></i>${6:Back to sign in}</a>
							</p>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
