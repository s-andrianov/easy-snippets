<section class="vh-100 d-flex align-items-center bg-body-tertiary">
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
				<div class="card border-0 shadow-sm">
					<div class="card-body p-4 p-md-5 text-center">
						<img src="${1:https://via.placeholder.com/96}" alt="${2:Avatar}" class="rounded-circle mb-3" width="96" height="96" />
						<h1 class="h4 fw-bold mb-1">${3:John Doe}</h1>
						<p class="text-body-secondary small mb-4">${4:Your session is locked. Enter password to continue.}</p>
						<form>
							<div class="form-floating mb-3">
								<input type="password" class="form-control" id="lockPassword" placeholder="Password" required />
								<label for="lockPassword">${5:Password}</label>
							</div>
							<button type="submit" class="btn btn-primary w-100 py-2 mb-2">${6:Unlock}</button>
							<a href="${7:#}" class="small text-decoration-none">${8:Sign in as different user}</a>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
