<section class="vh-100 d-flex align-items-center bg-body-tertiary">
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
				<div class="card border-0 shadow-sm">
					<div class="card-body p-4 p-md-5">
						<div class="text-center mb-4">
							<h1 class="h3 fw-bold mb-1">${1:Set a new password}</h1>
							<p class="text-body-secondary mb-0">${2:Choose a strong password you haven't used before}</p>
						</div>
						<form>
							<div class="form-floating mb-3">
								<input type="password" class="form-control" id="newPassword" placeholder="Password" minlength="8" required />
								<label for="newPassword">${3:New password}</label>
							</div>
							<div class="form-floating mb-3">
								<input type="password" class="form-control" id="confirmPassword" placeholder="Confirm" required />
								<label for="confirmPassword">${4:Confirm new password}</label>
							</div>
							<ul class="small text-body-secondary ps-3 mb-3">
								<li>${5:At least 8 characters}</li>
								<li>${6:Contains a number and a special symbol}</li>
								<li>${7:Mix of uppercase and lowercase}</li>
							</ul>
							<button type="submit" class="btn btn-primary w-100 py-2">${8:Reset password}</button>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
