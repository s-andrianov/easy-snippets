<div id="${1:heroCarousel}" class="carousel slide carousel-fade" data-bs-ride="carousel">
	<div class="carousel-indicators">
		<button type="button" data-bs-target="#${1:heroCarousel}" data-bs-slide-to="0" class="active" aria-current="true"></button>
		<button type="button" data-bs-target="#${1:heroCarousel}" data-bs-slide-to="1"></button>
		<button type="button" data-bs-target="#${1:heroCarousel}" data-bs-slide-to="2"></button>
	</div>
	<div class="carousel-inner">
		<div class="carousel-item active">
			<div class="position-relative text-white text-center" style="height: 70vh; min-height: 480px; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('${2:https://via.placeholder.com/1920x900}') center/cover no-repeat;">
				<div class="container h-100 d-flex flex-column justify-content-center">
					<h2 class="display-3 fw-bold mb-3">${3:Bold slide headline}</h2>
					<p class="lead mb-4">${4:Supporting copy that explains what this slide is about.}</p>
					<div><a href="${5:#}" class="btn btn-light btn-lg px-4 me-2">${6:Primary}</a><a href="${7:#}" class="btn btn-outline-light btn-lg px-4">${8:Secondary}</a></div>
				</div>
			</div>
		</div>
		<div class="carousel-item">
			<div class="position-relative text-white text-center" style="height: 70vh; min-height: 480px; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('${9:https://via.placeholder.com/1920x900}') center/cover no-repeat;">
				<div class="container h-100 d-flex flex-column justify-content-center">
					<h2 class="display-3 fw-bold mb-3">${10:Second slide}</h2>
					<p class="lead mb-4">${11:Supporting copy here.}</p>
					<div><a href="${12:#}" class="btn btn-light btn-lg px-4">${13:Action}</a></div>
				</div>
			</div>
		</div>
		<div class="carousel-item">
			<div class="position-relative text-white text-center" style="height: 70vh; min-height: 480px; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('${14:https://via.placeholder.com/1920x900}') center/cover no-repeat;">
				<div class="container h-100 d-flex flex-column justify-content-center">
					<h2 class="display-3 fw-bold mb-3">${15:Third slide}</h2>
					<p class="lead mb-4">${16:Supporting copy here.}</p>
					<div><a href="${17:#}" class="btn btn-light btn-lg px-4">${18:Action}</a></div>
				</div>
			</div>
		</div>
	</div>
	<button class="carousel-control-prev" type="button" data-bs-target="#${1:heroCarousel}" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
	<button class="carousel-control-next" type="button" data-bs-target="#${1:heroCarousel}" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
</div>
